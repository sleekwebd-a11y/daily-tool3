<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Palette</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 to-indigo-900 text-white flex items-center justify-center p-4">
  <div class="glass backdrop-blur-xl bg-white/10 border border-white/20 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <h1 class="text-3xl font-bold text-center mb-6 neon-text">Mood Palette</h1>
    <p class="text-center mb-8 opacity-80">How are you feeling today?</p>

    <select id="mood" class="w-full p-4 mb-6 bg-white/10 border border-white/30 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-purple-500">
      <option value="happy">Happy 😊</option>
      <option value="calm">Calm 😌</option>
      <option value="energetic">Energetic ⚡</option>
      <option value="sad">Sad 😔</option>
      <option value="motivated">Motivated 🔥</option>
    </select>

    <button id="generate" class="w-full py-4 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-bold text-lg hover:opacity-90 transition">
      Generate Palette
    </button>

    <div id="palette" class="grid grid-cols-5 gap-2 mt-8"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
